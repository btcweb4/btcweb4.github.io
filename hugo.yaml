# hugo server --themesDir ... --baseURL=http://0.0.0.0:1313/example

baseURL: https://btcweb4.github.io/
title: btcweb4
theme: hugo-book

# 每次构建前自动清空 public 目录
cleanDestinationDir: true 

# 开启文件压缩
minify:
  disableXML: false
  minifyOutput: true

# 允许 Markdown 文件中渲染原始 HTML 代码（解决 WARN Raw HTML omitted 警告）
markup:
  goldmark:
    renderer:
      unsafe: true

disableKinds: ["taxonomy", "taxonomyTerm"]
# themesDir: ../..

# Book configuration
disablePathToLower: true
enableGitInfo: true
params:
  BookShowToC: true
  BookMenuBundle: /menu
  BookSearch: true
  BookEnableJS: true
  BookRepo: https://github.com/btcweb4/btcweb4.github.io
  BookComments: true
  BookDateFormat: "2006-01-02"